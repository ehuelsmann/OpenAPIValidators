name: CI

on:
  push:
    paths-ignore:
      - '*.md'
      - '.all-contributorsrc'
  pull_request:
    paths-ignore:
      - '*.md'
      - '.all-contributorsrc'
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn test:ci

      - name: Post code coverage to CodeCov
        run: bash <(curl -s https://codecov.io/bash)
        if: success()
